<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Admin Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        
        body { display: flex; height: 100vh; background: #f4f7f6; }

        /* Sidebar */
        nav { width: 240px; background: #2c3e50; color: white; padding: 20px; }
        nav h2 { margin-bottom: 30px; font-size: 1.2rem; opacity: 0.8; }
        nav a { display: block; color: #bdc3c7; text-decoration: none; padding: 12px 0; border-bottom: 1px solid #34495e; }
        nav a:hover { color: white; }

        /* Main Content */
        main { flex-grow: 1; overflow-y: auto; }
        header { background: white; padding: 20px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; }
        
        .content { padding: 30px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 8px; border: 1px solid #eee; }
        
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        th, td { text-align: left; padding: 15px; border-bottom: 1px solid #eee; }
        th { background: #f9fafb; color: #666; }
    </style>
</head>
<body>

    <nav>
        <h2>ADMIN PANEL</h2>
        <a href="#">Dashboard</a>
        <a href="#">Users</a>
        <a href="#">Settings</a>
        <a href="#">Logout</a>
    </nav>

    <main>
        <header>
            <h1>Dashboard Overview</h1>
            <div>Welcome,Megha</div>
        </header>

        <div class="content">
            <div class="stats-grid">
                <div class="card"><h3>Total Users</h3><p>1,240</p></div>
                <div class="card"><h3>Sales</h3><p>$12,430</p></div>
                <div class="card"><h3>Active Sessions</h3><p>42</p></div>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>User</th>
                        <th>Status</th>
                        <th>Joined</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td>John Doe</td><td>Active</td><td>2024-03-01</td></tr>
                    <tr><td>Jane Smith</td><td>Pending</td><td>2024-03-05</td></tr>
                </tbody>
            </table>
        </div>
    </main>

</body>
</html>
